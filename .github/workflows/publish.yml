name: Publish Python 🐍 distribution 📦 to PyPI

on:
  push:
    # Обычно пакет заливают только тогда, когда создается новый тег версии (например v0.1.0)
    # Если вы хотите публиковать при ЛЮБОМ пуше в ветку main, 
    # закомментируйте блок tags и раскомментируйте branches
    tags:
      - 'v*.*.*'
    # branches:
    #   - main

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install pypa/build
        run: >-
          python3 -m pip install build --user
          
      - name: Build a binary wheel and a source tarball
        run: python3 -m build
        
      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish distribution 📦 to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/funny-word-generator 
    # Обязательные права для Trusted Publishing!
    permissions:
      id-token: write  
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1